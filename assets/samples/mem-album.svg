  </defs>
  <rect width="600" height="600" fill="url(#album-bg)"></rect>
  <ellipse cx="300" cy="540" rx="280" ry="20" fill="#5C3618" opacity="0.25"></ellipse>

  
  <g transform="translate(300,300) rotate(-3)">
    
